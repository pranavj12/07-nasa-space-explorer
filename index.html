<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&family=Share+Tech+Mono&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="starfield" aria-hidden="true"></canvas>

  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA logo" class="logo" />
      <div class="header-text">
        <h1>Space Explorer</h1>
        <p class="header-sub">Astronomy Picture of the Day</p>
      </div>
    </header>

    <section class="fact-bar" aria-label="Random space fact">
      <span class="fact-label">🌌 DID YOU KNOW?</span>
      <span id="factText" class="fact-text">Loading a space fact...</span>
    </section>

    <section class="filters" aria-label="Date range selector">
      <div class="filter-group">
        <label for="startDate">Start Date</label>
        <input type="date" id="startDate" />
      </div>

      <div class="filter-group">
        <label for="endDate">End Date</label>
        <input type="date" id="endDate" />
      </div>

      <button id="fetchBtn" type="button">🚀 Get Space Images</button>
    </section>

    <div id="loadingScreen" class="loading-screen" hidden>
      <div class="loading-ring"></div>
      <p class="loading-main">🔄 Loading space photos...</p>
      <p class="loading-sub">Reaching into the cosmos</p>
    </div>

    <div id="errorScreen" class="error-screen" hidden>
      <p>⚠️ <span id="errorMsg">Something went wrong. Please try again.</span></p>
    </div>

    <section id="gallery" class="gallery" aria-live="polite">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click “Get Space Images” to explore the cosmos.</p>
      </div>
    </section>
  </div>

  <div
    id="modalOverlay"
    class="modal-overlay"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modalTitle"
    hidden
  >
    <div class="modal-card">
      <button id="modalClose" class="modal-close" aria-label="Close modal">✕</button>

      <div id="modalMedia" class="modal-media"></div>

      <div class="modal-info">
        <p id="modalDate" class="modal-date"></p>
        <h2 id="modalTitle" class="modal-title"></h2>
        <p id="modalExplanation" class="modal-explanation"></p>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
